databases:
  - name: leaveflow-db
    plan: free
    databaseName: leaveflow
    user: leaveflow

services:
  - type: web
    name: leaveflow
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn leaveflow.wsgi:application --workers 1 --threads 4 --timeout 60 --max-requests 100 --max-requests-jitter 10"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: leaveflow-db
          property: connectionString
      - key: DATABASE_SSL
        value: "True"
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
